<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .box   { fill:#1f2937; stroke:#4b5563; stroke-width:1; rx:10; }
      .inner { fill:#374151; stroke:#6b7280; stroke-width:1; }
      .accent{ fill:#1d4ed8; stroke:#3b82f6; stroke-width:1; }
      .green { fill:#065f46; stroke:#10b981; stroke-width:1; }
      .t     { fill:#f9fafb; font-size:14px; font-weight:600; }
      .s     { fill:#d1d5db; font-size:11.5px; }
      .lbl   { fill:#9ca3af; font-size:11px; font-style:italic; }
      .arrow { stroke:#9ca3af; stroke-width:1.6; fill:none; marker-end:url(#a); }
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- the package -->
  <rect class="box" x="20" y="18" width="720" height="150" rx="12"/>
  <text class="t" x="40" y="46">openquant — the Python package</text>
  <text class="lbl" x="40" y="63">pip install; no web code inside</text>

  <rect class="inner" x="40"  y="78" width="215" height="70" rx="8"/>
  <text class="t" x="56" y="103" font-size="12.5">valuation</text>
  <text class="s" x="56" y="121">FCF · WACC · DCF · reverse-DCF</text>
  <text class="s" x="56" y="137">sensitivity · red flags</text>

  <rect class="inner" x="270" y="78" width="150" height="70" rx="8"/>
  <text class="t" x="286" y="103" font-size="12.5">portfolio · money</text>
  <text class="s" x="286" y="121">diversification, risk</text>
  <text class="s" x="286" y="137">time value of money</text>

  <rect class="inner" x="435" y="78" width="285" height="70" rx="8"/>
  <text class="t" x="451" y="103" font-size="12.5">data</text>
  <text class="s" x="451" y="121">SEC EDGAR filings · yfinance prices</text>
  <text class="s" x="451" y="137">file cache · offline sample data</text>

  <!-- consumers -->
  <rect class="accent" x="20" y="228" width="220" height="76" rx="10"/>
  <text class="t" x="38" y="256">api/ — FastAPI</text>
  <text class="s" x="38" y="275">serves the engine over HTTP</text>
  <text class="s" x="38" y="291">one deploy: render.yaml</text>

  <rect class="inner" x="270" y="228" width="220" height="76" rx="10"/>
  <text class="t" x="288" y="256">backtest/</text>
  <text class="s" x="288" y="275">the theory on 50 stocks,</text>
  <text class="s" x="288" y="291">2014 → 2024, vs reality</text>

  <rect class="green" x="520" y="228" width="220" height="76" rx="10"/>
  <text class="t" x="538" y="256">tests/ — 191 offline</text>
  <text class="s" x="538" y="275">pinned to worked answers</text>
  <text class="s" x="538" y="291">from real finance exams</text>

  <!-- app -->
  <rect class="accent" x="20" y="342" width="220" height="66" rx="10"/>
  <text class="t" x="38" y="369">app/ — React</text>
  <text class="s" x="38" y="388">live-ticker labs on the API</text>

  <!-- arrows -->
  <path class="arrow" d="M130 168 L130 226"/>
  <path class="arrow" d="M380 168 L380 226"/>
  <path class="arrow" d="M630 168 L630 226"/>
  <path class="arrow" d="M130 304 L130 340"/>

  <text class="lbl" x="270" y="392">the sister repo — a-bv.github.io/openquant — needs none of this: its card pages run entirely in the browser</text>
</svg>
