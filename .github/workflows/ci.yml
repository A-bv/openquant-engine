name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install the engine as a package
        run: pip install -e ".[api,dev]"

      - name: Run the offline test suite (exam oracles included)
        run: python -m pytest -q -m "not live"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Lint the app
        working-directory: app
        run: npm run lint

      - name: Build the app
        working-directory: app
        run: npm run build
